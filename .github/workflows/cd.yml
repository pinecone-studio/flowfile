name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  NX_NO_CLOUD: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ebms: ${{ steps.filter.outputs.ebms }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed deploy targets
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ebms:
              - 'apps/ebms/**'
              - 'libs/shadcn/**'
              - 'package.json'
              - 'yarn.lock'
              - 'nx.json'
            worker:
              - 'apps/worker/**'
              - 'package.json'
              - 'yarn.lock'

  deploy-ebms:
    name: Deploy ebms to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ebms == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate Cloudflare auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "::error::Missing GitHub Actions secret CLOUDFLARE_API_TOKEN"
            exit 1
          }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "::error::Missing GitHub Actions secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          }

      - name: Deploy ebms with OpenNext
        run: yarn workspace ebms deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy worker to Cloudflare
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate Cloudflare auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "::error::Missing GitHub Actions secret CLOUDFLARE_API_TOKEN"
            exit 1
          }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "::error::Missing GitHub Actions secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          }

      - name: Validate worker account access
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler whoami --account "$CLOUDFLARE_ACCOUNT_ID" --json >/dev/null || {
            echo "::error::Cloudflare authentication failed for account $CLOUDFLARE_ACCOUNT_ID."
            echo "::error::Check that CLOUDFLARE_API_TOKEN belongs to this account and is still valid."
            exit 1
          }

          npx wrangler d1 execute epas-db --remote --config apps/worker/wrangler.jsonc --command "select 1;" --json >/dev/null || {
            echo "::error::Unable to access D1 database epas-db (90fcefdd-724b-49f9-9d05-a7be6d9bfd1c)."
            echo "::error::Use the Cloudflare account that owns this D1 database and grant the token D1:Edit plus Workers Scripts:Edit."
            exit 1
          }

      - name: Check optional worker auth secrets
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
        run: |
          if [ -z "$CLERK_SECRET_KEY" ] && [ -z "$CLERK_JWT_KEY" ]; then
            echo "::warning::Skipping Clerk worker auth secret sync because CLERK_SECRET_KEY and CLERK_JWT_KEY are both unset"
          else
            echo "Clerk worker auth secret detected"
          fi

      - name: Sync worker runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
          CLERK_AUTHORIZED_PARTIES: ${{ secrets.CLERK_AUTHORIZED_PARTIES }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MAILCHANNELS_API_KEY: ${{ secrets.MAILCHANNELS_API_KEY }}
        run: |
          if [ -n "$CLERK_SECRET_KEY" ]; then
            printf '%s' "$CLERK_SECRET_KEY" | npx wrangler secret put CLERK_SECRET_KEY --config apps/worker/wrangler.jsonc
          fi

          if [ -n "$CLERK_JWT_KEY" ]; then
            printf '%s' "$CLERK_JWT_KEY" | npx wrangler secret put CLERK_JWT_KEY --config apps/worker/wrangler.jsonc
          fi

          if [ -n "$CLERK_AUTHORIZED_PARTIES" ]; then
            printf '%s' "$CLERK_AUTHORIZED_PARTIES" | npx wrangler secret put CLERK_AUTHORIZED_PARTIES --config apps/worker/wrangler.jsonc
          fi

          if [ -n "$BREVO_API_KEY" ]; then
            printf '%s' "$BREVO_API_KEY" | npx wrangler secret put BREVO_API_KEY --config apps/worker/wrangler.jsonc
          fi

          if [ -n "$MAILCHANNELS_API_KEY" ]; then
            printf '%s' "$MAILCHANNELS_API_KEY" | npx wrangler secret put MAILCHANNELS_API_KEY --config apps/worker/wrangler.jsonc
          fi

      - name: Apply worker database migrations
        run: npx wrangler d1 migrations apply epas-db --remote --config apps/worker/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync workflow registry and templates
        run: |
          npx wrangler d1 execute epas-db --remote --config apps/worker/wrangler.jsonc --file apps/worker/seeds/0001_action_registry.sql
          npx wrangler d1 execute epas-db --remote --config apps/worker/wrangler.jsonc --file apps/worker/seeds/0002_recipients.sql
          npx wrangler d1 execute epas-db --remote --config apps/worker/wrangler.jsonc --file apps/worker/seeds/0003_templates.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker with Wrangler
        run: npx wrangler deploy --config apps/worker/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
